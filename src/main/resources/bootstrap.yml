spring:
  application:
    name: msv-maven-student
    version: "@project.version@"
  banner:
    location: classpath:banner/banner-${SPRING_PROFILES_ACTIVE}.txt
  cloud:
    config:
      uri: ${CONFIG_SERVER:http://localhost:8888}
    vault:
      enabled: true
      host: ${VAULT_HOST:localhost}
      port: ${VAULT_PORT:8200}
      scheme: http
      authentication: APPROLE
      app-role:
        role-id: ${VAULT_ROLE_ID}
        secret-id: ${VAULT_SECRET_ID}
      kv:
        enabled: true
        backend: secret
  output:
    ansi:
      enabled: ALWAYS